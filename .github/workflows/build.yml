name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Clean previous local build artifacts
        run: |
          rm -rf bin

      - name: Build APK with Auto-Licensing
        run: |
          # 1. Forzamos a Buildozer a preparar su SDK local interno
          buildozer android web || true
          
          # 2. Ahora que Buildozer creó su propia ruta del SDK, localizamos su sdkmanager interno
          LOCAL_SDK="/home/runner/.buildozer/android/platform/android-sdk"
          
          # 3. Si Buildozer descargó la versión moderna de cmdline-tools, usamos esa. Si no, la tradicional.
          if [ -f "$LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            LOCAL_SDKMANAGER="$LOCAL_SDK/cmdline-tools/latest/bin/sdkmanager"
          elif [ -f "$LOCAL_SDK/tools/bin/sdkmanager" ]; then
            LOCAL_SDKMANAGER="$LOCAL_SDK/tools/bin/sdkmanager"
          else
            # Si no ha descargado nada aún, creamos manualmente la carpeta de licencias para prevenir el error
            mkdir -p "$LOCAL_SDK/licenses"
            # Copiamos las licencias pre-aceptadas del sistema de GitHub Actions directamente a Buildozer
            cp -r /usr/local/lib/android/sdk/licenses/* "$LOCAL_SDK/licenses/" || true
          fi
          
          # 4. Si el sdkmanager interno existe, le obligamos a aceptar la licencia 37 en su propia cara
          if [ ! -z "$LOCAL_SDKMANAGER" ]; then
            yes | "$LOCAL_SDKMANAGER" --licenses || true
            yes | "$LOCAL_SDKMANAGER" "build-tools;37.0.0" || true
          fi

          # 5. Ejecutamos la compilación real. Ya no se detendrá por licencias.
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
