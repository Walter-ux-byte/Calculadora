name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev \
            libffi-dev python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Clean previous local build artifacts
        run: |
          rm -rf bin
          rm -rf .buildozer

      - name: Build APK forcing auto-accept via environment
        run: |
          # El truco definitivo: Creamos la carpeta de licencias que Buildozer creará en el futuro
          # y le metemos las firmas digitales de Google pre-aprobadas mediante echo.
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          
          echo -e "244d2427ce41856d46e128c51c414673ffc168e9\n5c6690ddf2d314f817c9a58d2a13a2985396a84c\n7a79a695f8dba2f34a215e4765a0c016c921fd40\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9578cfde393430dac94\ne9ac30d0b3d0d3b859874a7134dece2521e0eb9d" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # Adicionalmente, creamos otra firma específica por si busca el formato alternativo
          echo -e "244d2427ce41856d46e128c51c414673ffc168e9" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-hold
          
          # Ahora sí, ejecutamos Buildozer de forma normal
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk
