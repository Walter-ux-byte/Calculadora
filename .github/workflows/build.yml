name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Bootstrap Android SDK inside Buildozer's path
        # CAUSA RAÍZ (línea 51 del log):
        # Buildozer busca sdkmanager en:
        #   ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        # Pero ese directorio no existe porque buildozer solo crea la carpeta
        # vacía del SDK y no instala cmdline-tools.
        #
        # SOLUCIÓN: descargar cmdline-tools e instalarlo exactamente donde
        # buildozer lo busca, luego usar ese sdkmanager para instalar
        # build-tools, platforms y aceptar todas las licencias.
        run: |
          BUILDOZER_SDK="${HOME}/.buildozer/android/platform/android-sdk"
          mkdir -p "${BUILDOZER_SDK}"

          # 1. Descargar cmdline-tools (versión estable de Google)
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          wget -q "${CMDLINE_TOOLS_URL}" -O /tmp/cmdline-tools.zip

          # 2. Descomprimir en la ubicación temporal
          mkdir -p /tmp/cmdline-tools-extract
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract

          # 3. Instalar en la ruta legacy que buildozer usa: android-sdk/tools/
          #    (buildozer busca tools/bin/sdkmanager, NO cmdline-tools/latest/bin/sdkmanager)
          mkdir -p "${BUILDOZER_SDK}/tools"
          cp -r /tmp/cmdline-tools-extract/cmdline-tools/* "${BUILDOZER_SDK}/tools/"

          # 4. Verificar que sdkmanager existe en la ruta correcta
          SDKMANAGER="${BUILDOZER_SDK}/tools/bin/sdkmanager"
          echo "--- Verificando sdkmanager ---"
          ls -la "${SDKMANAGER}"

          # 5. Escribir las licencias ANTES de instalar paquetes
          LICENSES_DIR="${BUILDOZER_SDK}/licenses"
          mkdir -p "${LICENSES_DIR}"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n' \
            > "${LICENSES_DIR}/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "${LICENSES_DIR}/android-sdk-preview-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a\n' \
            > "${LICENSES_DIR}/intel-android-extra-license"

          # 6. Aceptar licencias via sdkmanager también (doble cobertura)
          yes | "${SDKMANAGER}" --sdk_root="${BUILDOZER_SDK}" --licenses 2>/dev/null || true

          # 7. Instalar los paquetes que buildozer necesitará
          yes | "${SDKMANAGER}" --sdk_root="${BUILDOZER_SDK}" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" 2>/dev/null || true

          # 8. Aceptar licencias una vez más tras instalar (cubre build-tools nuevas)
          yes | "${SDKMANAGER}" --sdk_root="${BUILDOZER_SDK}" --licenses 2>/dev/null || true

          echo "--- SDK Bootstrap completo ---"
          ls "${BUILDOZER_SDK}/"

      - name: Clean previous local build artifacts
        run: |
          rm -rf .buildozer/android/platform/build-*
          rm -rf bin

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
