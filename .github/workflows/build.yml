name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev \
            libffi-dev python3-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Pre-Accept SDK Licenses & Enforce Build Tools
        run: |
          # Usamos el sdkmanager del sistema configurado por la acción oficial
          yes | sdkmanager --licenses || true
          yes | sdkmanager "build-tools;33.0.2" "build-tools;37.0.0" "platforms;android-33" "platform-tools" || true
          
          # Forzamos a Buildozer a ver las licencias del sistema directamente en su raíz
          mkdir -p ~/.buildozer/android/platform/android-sdk/
          ln -s $ANDROID_HOME/licenses ~/.buildozer/android/platform/android-sdk/licenses || true

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Clean previous local build artifacts
        run: |
          rm -rf bin
          rm -rf .buildozer/android/platform/build-*

      - name: Build APK with Error Capture
        run: |
          # Guardamos el output en un log por si falla
          buildozer --verbose android debug > buildozer_output.log 2>&1

      - name: Print Error Log on Failure
        if: failure()
        run: |
          echo "======================================================================"
          echo "    ERROR DETECTADO EN LA COMPILACIÓN DE BUILDOZER:"
          echo "======================================================================"
          tail -n 200 buildozer_output.log
          echo "======================================================================"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk
